name: Build EagleAI for Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Install pnpm via npm
        run: npm install -g pnpm@9.15.4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/eagle-ai/src-tauri
      
      - name: Install Windows dependencies
        run: |
          choco install nsis -y
          choco install webview2 -y
      
      - name: Install project dependencies
        run: npx pnpm install --frozen-lockfile
      
      - name: Build Python Sidecar
        run: |
          cd packages/shared-backend
          python -m pip install --upgrade pip
          pip install pyinstaller
          pyinstaller --onefile --windowed --name backend src/shared_backend/main.py
          if not exist "..\..\apps\eagle-ai\src-tauri\binaries\" mkdir "..\..\apps\eagle-ai\src-tauri\binaries\"
          copy dist\backend.exe ..\..\apps\eagle-ai\src-tauri\binaries\backend.exe
        shell: cmd
      
      - name: Build Tauri App
        run: |
          cd apps/eagle-ai
          npx pnpm tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: eagle-ai-windows-installer
          path: apps/eagle-ai/src-tauri/target/release/bundle/nsis/*.exe
      
      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eagle-ai-windows-msi
          path: apps/eagle-ai/src-tauri/target/release/bundle/msi/*.msi
