name: Build EagleAI for Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install pnpm (reliable way for Windows)
        run: |
          npm install -g pnpm
          $env:PATH += ";$env:APPDATA\npm"
          echo "PNPM_HOME=$env:APPDATA\npm" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "$env:APPDATA\npm" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify pnpm is available
        run: pnpm --version

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Windows dependencies
        run: |
          choco install nsis --yes
          choco install webview2 --yes

      - name: Install project dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Python Sidecar (backend.exe)
        run: |
          cd packages/shared-backend
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          pyinstaller --onefile --windowed --name backend src/shared_backend/main.py
          mkdir -p ../../apps/eagle-ai/src-tauri/binaries
          copy dist\backend.exe ../../apps/eagle-ai/src-tauri/binaries\backend.exe

      - name: Build Tauri App for Windows
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/eagle-ai
          includeRelease: true

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: EagleAI-Windows-Installer
          path: apps/eagle-ai/src-tauri/target/release/bundle/nsis/*.exe
